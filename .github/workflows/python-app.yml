name: Python application

on:
  repository_dispatch:
    types: [on-demand-test]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v2
    - name: Set up Python 3.8
      uses: actions/setup-python@v1
      with:
        python-version: 3.8
    - name: Run script
      run: |
        python env_test.py
      env:
        ENV_KEY: imabari
